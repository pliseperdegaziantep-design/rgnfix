<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0D1B2A" />
  <title>RGNFIX — Bağlantı Yok</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#f5f7f8;color:#0d1b2a;font-family:Inter,Arial,sans-serif}.card{width:min(100%,460px);background:#fff;border:1px solid #dce3e6;border-radius:24px;padding:32px;text-align:center;box-shadow:0 16px 50px rgba(13,27,42,.08)}.logo{font-size:34px;font-weight:900;letter-spacing:-2px}.logo span{color:#23a7a7}.icon{width:64px;height:64px;margin:24px auto;display:grid;place-items:center;border-radius:20px;background:#e9f6f6;font-size:28px}h1{font-size:25px;margin:0 0 12px}p{color:#617178;line-height:1.6;margin:0 0 24px}button{border:0;border-radius:12px;padding:13px 20px;background:#0d4b4b;color:#fff;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">RGN<span>FIX</span></div>
    <div class="icon">⌁</div>
    <h1>İnternet bağlantısı yok</h1>
    <p>Bağlantınızı kontrol edin. İnternet tekrar geldiğinde ölçü, sipariş ve hesap işlemlerinize devam edebilirsiniz.</p>
    <button type="button" onclick="location.reload()">Tekrar Dene</button>
  </main>
</body>
</html>
